<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #064e3b; /* Deep Emerald */
            background-image: radial-gradient(circle at 50% 50%, #065f46 0%, #064e3b 100%);
        }

        .gold-border {
            border: 2px solid #d4af37;
        }

        .gold-text {
            color: #d4af37;
        }

        .gold-bg {
            background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #d4af37 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .transition-height {
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .hidden-content { max-height: 0; }
        .visible-content { max-height: 5000px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">

    <div class="max-w-2xl mx-auto px-4 py-12">
        <!-- Header Section -->
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-24 h-24 gold-bg rounded-3xl shadow-2xl mb-6 floating border-4 border-emerald-900">
                <!-- Money Logo (Money Bag) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-emerald-900" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 3h12l4 6-10 12L2 9l4-6z"></path>
                    <path d="M11 3v15"></path>
                    <path d="M12 12h5"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M17 6h-2"></path>
                    <path d="M7 6h2"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">Eid Salami From Sufiyan</h1>
            <p class="text-emerald-200 font-medium tracking-wide">Official Digital Registry for Eidi 2026</p>
        </header>

        <!-- Application Card -->
        <main class="glass-card rounded-[2.5rem] p-8 mb-8 gold-border shadow-2xl relative">
            <form id="salamiForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-emerald-900 mb-2 ml-1">Applicant Full Name</label>
                    <input type="text" id="nameInput" required placeholder="Enter your full name" 
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-emerald-600 focus:ring-4 focus:ring-emerald-100 outline-none transition-all bg-slate-50">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-emerald-900 mb-2 ml-1">Contact Number</label>
                        <input type="tel" id="phoneInput" required placeholder="01xxxxxxxxx" 
                            class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-emerald-600 focus:ring-4 focus:ring-emerald-100 outline-none transition-all bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase tracking-widest text-emerald-900 mb-2 ml-1">Request Amount (৳)</label>
                        <input type="number" id="amountInput" required placeholder="Amount" 
                            class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-emerald-600 focus:ring-4 focus:ring-emerald-100 outline-none transition-all bg-slate-50">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black uppercase tracking-widest text-emerald-900 mb-2 ml-1">Justification</label>
                    <textarea id="reasonInput" rows="3" placeholder="Why do you deserve this Salami?" 
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:border-emerald-600 focus:ring-4 focus:ring-emerald-100 outline-none transition-all resize-none bg-slate-50"></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-5 gold-bg hover:brightness-105 text-emerald-950 font-black rounded-2xl shadow-xl transform active:scale-[0.98] transition-all uppercase tracking-widest text-sm">
                    Submit Application
                </button>
            </form>

            <div id="statusMsg" class="hidden mt-6 p-4 rounded-2xl text-center text-sm font-bold border"></div>
        </main>

        <!-- History Section -->
        <div class="glass-card rounded-[2.5rem] overflow-hidden gold-border shadow-xl">
            <button onclick="toggleList()" class="w-full px-8 py-6 flex items-center justify-between hover:bg-emerald-50 transition-colors focus:outline-none">
                <span class="text-lg font-bold text-emerald-900 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 gold-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Master Registry (<span id="count">0</span>)
                </span>
                <svg id="chevron" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-800 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <div id="listContent" class="transition-height hidden-content bg-white">
                <div class="p-8 border-t border-slate-100">
                    
                    <!-- Admin Unlock -->
                    <div class="mb-8 p-5 bg-emerald-50 rounded-2xl border border-emerald-100 flex items-center gap-4">
                        <div id="lockIcon" class="p-3 bg-white rounded-xl shadow-sm text-emerald-400 border border-emerald-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <div class="flex-1">
                            <span class="block text-[10px] uppercase tracking-widest font-black text-emerald-700 mb-1">Identity Verification</span>
                            <input type="password" id="passcodeInput" placeholder="Enter admin code" 
                                class="w-full bg-transparent outline-none text-sm font-bold text-emerald-950">
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto">
                        <table id="historyTable" class="w-full text-left hidden">
                            <thead>
                                <tr class="text-[10px] uppercase tracking-[0.2em] text-emerald-700 font-black border-b border-slate-100">
                                    <th class="pb-4 px-2">Applicant</th>
                                    <th class="pb-4 px-2">Phone</th>
                                    <th class="pb-4 px-2 text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-emerald-50">
                            </tbody>
                        </table>
                        <div id="emptyMsg" class="text-center py-10 text-emerald-400 text-sm font-medium">
                            No applications submitted yet.
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="mt-12 text-center text-emerald-200/40 text-[10px] uppercase tracking-[0.3em] font-bold">
            Cloud Secured Database &bull; Eid Mubarak
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'eid-salami-final';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const ADMIN_CODE = "sufiSalami";
        let records = [];
        let isAdmin = false;

        const form = document.getElementById('salamiForm');
        const submitBtn = document.getElementById('submitBtn');
        const passcodeInput = document.getElementById('passcodeInput');
        const tableBody = document.getElementById('tableBody');
        const historyTable = document.getElementById('historyTable');
        const listContent = document.getElementById('listContent');
        const chevron = document.getElementById('chevron');
        const lockIcon = document.getElementById('lockIcon');
        const emptyMsg = document.getElementById('emptyMsg');
        const countSpan = document.getElementById('count');
        const statusMsg = document.getElementById('statusMsg');

        // Authentication Sequence
        const startAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        startAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'registrants');
                onSnapshot(colRef, (snapshot) => {
                    records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    records.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    renderTable();
                }, (error) => console.error(error));
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            submitBtn.disabled = true;
            submitBtn.innerText = "Securing Submission...";

            const data = {
                name: document.getElementById('nameInput').value.trim(),
                phone: document.getElementById('phoneInput').value.trim(),
                amount: document.getElementById('amountInput').value.trim(),
                reason: document.getElementById('reasonInput').value.trim(),
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrants'), data);
                form.reset();
                showStatus("Blessed Submission Successful!", "bg-emerald-50 text-emerald-800 border-emerald-100");
            } catch (err) {
                showStatus("Network glitch. Please try again.", "bg-red-50 text-red-800 border-red-100");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Application";
            }
        });

        function showStatus(text, classes) {
            statusMsg.innerText = text;
            statusMsg.className = `mt-6 p-4 rounded-2xl text-center text-sm font-bold border ${classes}`;
            statusMsg.classList.remove('hidden');
            setTimeout(() => statusMsg.classList.add('hidden'), 5000);
        }

        window.toggleList = () => {
            const isOpen = listContent.classList.contains('visible-content');
            if (isOpen) {
                listContent.classList.remove('visible-content');
                listContent.classList.add('hidden-content');
                chevron.classList.remove('rotate-180');
            } else {
                listContent.classList.add('visible-content');
                listContent.classList.remove('hidden-content');
                chevron.classList.add('rotate-180');
                renderTable();
            }
        };

        passcodeInput.addEventListener('input', (e) => {
            if (e.target.value === ADMIN_CODE) {
                isAdmin = true;
                lockIcon.className = "p-3 bg-emerald-600 text-white rounded-xl shadow-lg border border-emerald-700";
                lockIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" /></svg>`;
            } else {
                isAdmin = false;
                lockIcon.className = "p-3 bg-white text-emerald-400 rounded-xl shadow-sm border border-emerald-100";
                lockIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>`;
            }
            renderTable();
        });

        function renderTable() {
            tableBody.innerHTML = '';
            countSpan.innerText = records.length;
            
            if (records.length === 0) {
                emptyMsg.classList.remove('hidden');
                historyTable.classList.add('hidden');
                return;
            } 
            
            emptyMsg.classList.add('hidden');
            historyTable.classList.remove('hidden');

            records.forEach(rec => {
                const name = isAdmin ? rec.name : (rec.name.length > 2 ? rec.name.substring(0, 2) + "****" : rec.name[0] + "***");
                const phone = isAdmin ? rec.phone : (rec.phone.length > 6 ? rec.phone.substring(0, 3) + "*****" + rec.phone.slice(-2) : "****");
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-emerald-50/50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-2 font-bold text-emerald-950">${name}</td>
                    <td class="py-4 px-2 text-slate-500 font-mono text-xs">${phone}</td>
                    <td class="py-4 px-2 font-black gold-text text-right">৳${rec.amount}</td>
                `;
                tableBody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
